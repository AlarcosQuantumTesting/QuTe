<div class="workspace-container fade-in" *ngIf="project">

  <!-- Workspace Header -->
  <div class="workspace-header glass-panel">
    <div class="project-info">
      <!-- Editable project name -->
      <div class="project-name-wrapper">
        <input
          *ngIf="editingName"
          class="project-name-input code-font"
          [(ngModel)]="projectNameCache"
          (blur)="saveProjectName()"
          (keyup.enter)="saveProjectName()"
          (keyup.escape)="cancelNameEdit()"
          #nameInput
          autofocus
          placeholder="Project name..."
        >
        <h2 *ngIf="!editingName"
            class="code-font project-name-display"
            (click)="startNameEdit()"
            title="Click to rename">
          {{ project.name }}
          <i class="fas fa-pen name-edit-icon"></i>
        </h2>
      </div>
    </div>
    <div class="project-actions">
      <button class="btn-danger" (click)="deleteProject()">
        <i class="fas fa-trash"></i> Delete Project
      </button>
    </div>
  </div>

  <!-- Circuit & Editor Content -->
  <div class="glass-panel circuit-panel" style="margin-top: 16px; padding: 24px;">
    <h3 style="margin-top: 0; display: flex; align-items: center; gap: 8px;">
      <svg class="quantum-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--accent-primary);">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.5" />
        <circle cx="12" cy="12" r="10.5" stroke="currentColor" stroke-width="1" stroke-dasharray="1 2" opacity="0.3" />
      </svg>
      Quantum Circuit Design
    </h3>

    <!-- Qubit Selection (Input/Output) -->
    <div class="config-row-qubits" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
      <!-- Input Qubits -->
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <div class="config-label-header" style="display: flex; justify-content: space-between; align-items: center;">
          <label style="font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); display: flex; align-items: center; gap: 4px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="color: var(--accent-primary);">
              <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Input Qubits
          </label>
          <button class="select-all-btn small-btn" (click)="toggleAllInputQubits()">
            <i class="fas fa-check-double" style="margin-right: 4px;"></i> Select All
          </button>
        </div>

        <div class="output-qubits-inline">
          <label *ngFor="let qubitIndex of qubitsIndices" class="qubit-checkbox">
            <input type="checkbox" [(ngModel)]="inputQubitsSelection[qubitIndex]" (change)="updateInputQubits()" class="glass-checkbox">
            <span>Q{{ qubitIndex }}</span>
          </label>
          <div *ngIf="qubitsIndices.length === 0" class="text-muted" style="font-size: 13px; padding: 4px 8px;">
            No qubits detected. Please validate circuit.
          </div>
        </div>
      </div>

      <!-- Output Qubits -->
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <div class="config-label-header" style="display: flex; justify-content: space-between; align-items: center;">
          <label style="font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); display: flex; align-items: center; gap: 4px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="color: var(--accent-primary);">
              <path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Output Qubits
          </label>
          <button class="select-all-btn small-btn" (click)="toggleAllOutputQubits()">
            <i class="fas fa-check-double" style="margin-right: 4px;"></i> Select All
          </button>
        </div>

        <div class="output-qubits-inline">
          <label *ngFor="let qubitIndex of qubitsIndices" class="qubit-checkbox">
            <input type="checkbox" [(ngModel)]="outputQubitsSelection[qubitIndex]" (change)="updateOutputQubits()" class="glass-checkbox">
            <span>Q{{ qubitIndex }}</span>
          </label>
          <div *ngIf="qubitsIndices.length === 0" class="text-muted" style="font-size: 13px; padding: 4px 8px;">
            No qubits detected. Please validate circuit.
          </div>
        </div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; margin-bottom: 20px;">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--accent-primary);">
          <path d="M8 6L4 12L8 18M16 6L20 12L16 18M14 4L10 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <label style="font-size: 13px; font-weight: 500; color: var(--text-secondary);">Quirk Circuit JSON:</label>
      </div>
      <textarea class="glass-input code-font" [(ngModel)]="quirkCodeText" (ngModelChange)="onQuirkCodeChange($event)" rows="12" style="resize: vertical; line-height: 1.5;" placeholder='e.g. {"cols": [["H"], ["•", "X"]]}'></textarea>
    </div>

    <div class="button-row" style="display: flex; gap: 12px; margin-bottom: 8px;">
      <button class="btn-quantum" (click)="visualizeCircuit()" [disabled]="!quirkCodeText.trim()" style="background: linear-gradient(135deg, var(--accent-secondary) 0%, var(--accent-tertiary) 100%);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 6px; display: inline-block; vertical-align: middle;">
          <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke="currentColor" stroke-width="2" />
          <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke="currentColor" stroke-width="2" />
        </svg>
        Visualize in Quirk
        <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
      </button>
    </div>
  </div>

</div>
