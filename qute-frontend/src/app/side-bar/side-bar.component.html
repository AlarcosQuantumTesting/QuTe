<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<div class="sidebar" [class.open]="menuAbierto">
  <!-- Unified Header -->
  <div class="sidebar-header" style="gap: 8px;">

    <h3 *ngIf="menuAbierto" class="code-font" style="margin: 0; font-size: 1.1rem;">Projects</h3>

    <div class="header-actions">
      <ng-container *ngIf="menuAbierto">
        <button *ngIf="isLoggedIn()" class="refresh-btn" (click)="refreshCircuits()" title="Refresh List"
          aria-label="Refresh project list">
          <i class="fas fa-sync-alt"></i>
        </button>

        <button class="new-btn" (click)="createNewCircuit()" [disabled]="isCreatingProject"
          [class.creating]="isCreatingProject" aria-label="Create New Project">
          <i class="fas" [ngClass]="isCreatingProject ? 'fa-spinner fa-spin' : 'fa-plus'"></i>
        </button>
      </ng-container>

      <button class="toggle-btn" (click)="toggleMenu()" aria-label="Toggle menu">
        <i class="fas" [ngClass]="menuAbierto ? 'fa-times' : 'fa-bars'"></i>
      </button>
    </div>
  </div>

  <!-- Loading indicator -->
  <div *ngIf="loading" class="loading-container">
    <i class="fas fa-spinner fa-spin"></i>
    <span *ngIf="menuAbierto">Loading projects...</span>
  </div>

  <!-- Projects tree -->
  <div *ngIf="!loading" class="tree-container">
    <ul class="tree-list">
      <li *ngFor="let circuit of circuits" class="tree-item circuit-item">

        <!-- Project node (top level) -->
        <div class="tree-node" [class.selected]="isProjectRouteSelected(circuit)">

          <!-- Expand chevron -->
          <i class="fas fa-chevron-right expand-icon"
             [class.expanded]="isProjectExpanded(circuit.id!)"
             (click)="toggleProject(circuit.id!); $event.stopPropagation()"
             *ngIf="menuAbierto"></i>

          <!-- Project icon + label -->
          <i class="fas fa-microchip circuit-icon node-icon"></i>
          <span *ngIf="menuAbierto" class="node-label" (click)="selectProject(circuit)">
            {{ circuit.name }}
            <span *ngIf="!circuit.saved" class="unsaved-indicator" title="Unsaved changes"></span>
          </span>
          <span *ngIf="!menuAbierto" class="tooltip">{{ circuit.name }}</span>
        </div>

        <!-- Children: Test Suites -->
        <ul *ngIf="isProjectExpanded(circuit.id!) && menuAbierto" class="tree-sublist">

          <!-- Test Suite node (one per suite) -->
          <li *ngFor="let suite of getTestSuites(circuit); let i = index" class="tree-item suite-item">
            <div class="tree-node suite-node"
                 [class.selected]="isSuiteRouteSelected(circuit, i)"
                 (click)="selectTestSuite(circuit, i)">
              <i class="fas fa-vials suite-icon node-icon"></i>
              <span class="node-label">
                Test Suite {{ i + 1 }}
              </span>
            </div>
          </li>

          <!-- Empty state: no suites yet, show placeholder -->
          <li *ngIf="getTestSuites(circuit).length === 0" class="tree-item suite-item">
            <div class="tree-node suite-node"
                 [class.selected]="isSuiteRouteSelected(circuit, 0)"
                 (click)="selectTestSuite(circuit, 0)">
              <i class="fas fa-vials suite-icon node-icon"></i>
              <span class="node-label">Test Suite 1</span>
            </div>
          </li>

          <!-- Add Test Suite option -->
          <li class="tree-item add-suite-item">
            <div class="tree-node add-suite-node" (click)="addTestSuite(circuit); $event.stopPropagation()">
              <i class="fas fa-plus add-suite-icon node-icon"></i>
              <span class="node-label text-muted" style="font-style: italic;">Add Test Suite</span>
            </div>
          </li>

        </ul>

      </li>
    </ul>

    <!-- Empty state -->
    <div *ngIf="circuits.length === 0" class="empty-state">
      <i class="fas fa-exclamation-circle"></i>
      <span *ngIf="menuAbierto">No projects found</span>
    </div>
  </div>

  <!-- Footer / User Section -->
  <div class="sidebar-footer">
    <div class="user-section">
      <div class="user-menu-container">
        <div class="user-icon-wrapper" (click)="toggleUserMenu($event)" [class.active]="userMenuOpen">
          <i class="fas fa-user-circle user-icon"></i>

          <div class="user-dropdown" *ngIf="userMenuOpen" (click)="$event.stopPropagation()">
            <div class="dropdown-header" *ngIf="isLoggedIn()">
              <span>Active Session</span>
            </div>

            <ng-container *ngIf="isLoggedIn()">
              <button (click)="navigateToQSauron()" class="dropdown-item">
                <i class="fas fa-project-diagram"></i> QSauron Dashboard
              </button>
              <button (click)="toggleTheme()" class="dropdown-item">
                <i class="fas fa-adjust"></i> Toggle Theme
              </button>
            </ng-container>

            <ng-container *ngIf="!isLoggedIn()">
              <button (click)="toggleTheme()" class="dropdown-item">
                <i class="fas fa-adjust"></i> Toggle Theme
              </button>
              <button (click)="navigateToQSauron()" class="dropdown-item">
                <i class="fas fa-sign-in-alt"></i> Log In
              </button>
            </ng-container>
          </div>
        </div>
      </div>

      <div *ngIf="isLoggedIn()" class="logout-wrapper" (click)="logout()" title="Log Out">
        <i class="fas fa-sign-out-alt logout-icon"></i>
      </div>
    </div>
  </div>
</div>
