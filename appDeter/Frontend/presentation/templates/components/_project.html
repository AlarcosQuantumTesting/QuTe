<h2>Execute Project</h2>

<div class="mb-3">
  <label for="projectSelect" class="col-form-label me-2">Select a Project:</label>
  <select id="projectSelect" onchange="selectProject()" class="form-control">
    <option value="" selected>Choose a project</option>
  </select>
</div>

<div class="row align-items-stretch" style="min-height: 400px;">
  <!-- columna izquierda -->
  <div class="col-md-6 d-flex flex-column">
    <div id="textareasContainer" class="card card-body d-flex flex-column flex-grow-1 mb-3">
      <h5 class="card-title">Circuit Code</h5>
      <textarea id="circuitSelect" class="form-control flex-grow-1" style="min-height: 0;" placeholder="Circuit to test" disabled></textarea>
      <button id="editCircuitButton" class="btn btn-secondary mt-2" onclick="enableEditing('circuitSelect')">Edit Circuit</button>
      <button id="saveCircuitButton" class="btn btn-primary mt-2 d-none" onclick="saveCircuitChanges()">Save Circuit Changes</button>
      <button id="cancelCircuitButton" class="btn btn-secondary mt-2 d-none" onclick="cancelCircuitEditing()">Cancel</button>
    </div>
  </div>

  <!-- columna derecha -->
  <div class="col-md-6 d-flex flex-column">
    <div id="cutConfigContainer" class="card card-body d-flex flex-column flex-grow-1 mb-3">
      <h5 class="card-title">Test Configuration</h5>
      <div class="mt-3">
        <h6>Configuration</h6>
        <div id="oiMapTableExecute"></div>
      </div>
      <div class="row mb-2">
        <div class="col-md-6">
          <label class="form-label">Input Indexes</label>
          <input type="text" id="cutInputsDisplay" class="form-control-plaintext" readonly>
        </div>
        <div class="col-md-6">
          <label class="form-label">Output Indexes</label>
          <input type="text" id="cutOutputsDisplay" class="form-control-plaintext" readonly>
        </div>
      </div>

   

      <div class="mb-2">
        <label class="form-label">Shots</label>
        <input type="text" id="cutShotsDisplay" class="form-control-plaintext" readonly>
      </div>

      <div class="mb-2" id="errorRangeDisplayRow">
        <label class="form-label">Error Range (%)</label>
        <input type="text" id="errorRangeDisplay" class="form-control-plaintext" readonly>
      </div>

      <button id="editCutButton" class="btn btn-secondary mt-auto" onclick="showEditCutForm()">Edit Testing Config</button>
    </div>

    <div id="cutConfigForm" class="card card-body d-flex flex-column flex-grow-1 mb-3 d-none">
      <h5 class="card-title">Edit Test Configuration</h5>

      <div class="mb-2">
        <div class="col-md-6">
          <label class="form-label">Input Indexes</label>
          <input type="text" id="cutInputs" class="form-control" placeholder="e.g. 0,1">
        </div>
        <div class="col-md-6">
          <label class="form-label">Output Indexes</label>
          <input type="text" id="cutOutputs" class="form-control" placeholder="e.g. 2,3">
        </div>
      </div>

      <div class="mb-2">
        <label class="form-label">Shots</label>
        <input type="number" id="cutShots" class="form-control" placeholder="Number of shots">
      </div>

      <div class="mb-2"  id="errorRangeEditRow">
        <label class="form-label">Error Range (%)</label>
        <input type="number" min="0" max="100" step="0.1" id="errorRangeEdit" class="form-control" placeholder="e.g. 5">
      </div>
      <div class="mb-2 flex-grow-1 overflow-auto">
        <label id="testCasesLabel" class="form-label">Test Cases</label>
        <div id="testCasesContainer" class="d-flex flex-column"></div>
        <button type="button" class="btn btn-outline-primary mt-2" onclick="addTestCaseField(testCasesContainer)">+ Add state</button>
      </div>

      <div class="d-flex justify-content-end">
        <button class="btn btn-secondary me-2" onclick="cancelEditCutForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTestConfigToDB()">Save</button>
      </div>
    </div>
  </div>
</div>
<button id="runTestsBtn" class="btn btn-success mt-3">Run Test</button>


<h4>Terminal</h4>
<div id="testProgressContainer" class="mb-3">
  <div class="progress"></div>
</div>
<button id="openNotesBtn" class="notes-fab" type="button" onclick="window.openNotesDrawer()">
  📝
</button>
<div id="testVerdicts"></div>

<div id="executionResults" class="mt-3 d-none">
  <div id="executionMessage"></div> 
  <div id="stochasticTableContainer" class="mt-3 d-none"></div>
  <div id="circuitImages"></div>
  <div id="stochasticChartContainer" class="mt-3 d-none">
    <h5>Stochastic Results (%)</h5>
    <canvas id="stochasticChart" style="max-width:600px;"></canvas>
  </div>

  
</div>
